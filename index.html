<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas where no buttons exist */
        }
        .interactive {
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="ui-layer" class="flex flex-col gap-4">
        <div class="bg-gray-900/80 text-white p-6 rounded-xl shadow-lg backdrop-blur-sm border border-gray-700 max-w-sm interactive">
            <h1 class="text-2xl font-bold mb-2 text-blue-400">Model Viewer</h1>
            <p class="text-gray-300 text-sm mb-4">
                Loading <code>character.glb</code>...<br>
                <span class="text-xs text-gray-400">If the file isn't found (because this is a web preview), use the button below to load your local file.</span>
            </p>
            <div class="flex flex-col gap-3">
                <label class="flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-lg transition-all transform hover:scale-[1.02] active:scale-95 shadow-md cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Load Local File
                    <input type="file" id="file-input" accept=".gltf,.glb" class="hidden">
                </label>
            </div>
            <div id="status-msg" class="mt-3 text-xs text-center text-gray-400 h-4">Waiting for model...</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        
        // Add a grid helper
        const gridHelper = new THREE.GridHelper(10, 10, 0x444444, 0x333333);
        scene.add(gridHelper);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2, 2, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.outputColorSpace = THREE.SRGBColorSpace; // Important for GLTF colors
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // Brighter for models
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Loader Logic ---
        const loader = new GLTFLoader();
        let mixer = null;
        let model = null;
        const statusMsg = document.getElementById('status-msg');

        // Function to handle the loaded model
        function onModelLoaded(gltf) {
            // Remove previous model if exists
            if (model) scene.remove(model);

            model = gltf.scene;
            scene.add(model);

            // Center the model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            // Auto-center and place on floor
            model.position.x += (model.position.x - center.x);
            model.position.z += (model.position.z - center.z);
            model.position.y = 0; // Assume feet are at 0 local y

            // Adjust camera to fit model
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 * Math.tan(fov * 2)); 
            camera.position.set(cameraZ * 1.5, size.y / 2, cameraZ * 1.5);
            controls.target.set(0, size.y / 2, 0);
            controls.update();

            // Handle Animations (Rigging)
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
                statusMsg.textContent = `Playing animation: ${gltf.animations[0].name}`;
            } else {
                statusMsg.textContent = "Model loaded (Static).";
            }
            
            console.log("Model loaded successfully");
        }

        // 1. Try to load 'character.glb' from relative path (Server mode)
        loader.load(
            './character.glb',
            onModelLoaded,
            (xhr) => {
                const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                if(percent < 100) statusMsg.textContent = `Loading default: ${percent}%`;
            },
            (error) => {
                console.warn('Default character.glb not found. Use upload button.');
                statusMsg.textContent = "Default file not found. Please upload.";
            }
        );

        // 2. Handle File Upload (Browser Preview mode)
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            statusMsg.textContent = "Parsing uploaded file...";
            
            loader.load(
                url,
                (gltf) => {
                    onModelLoaded(gltf);
                    URL.revokeObjectURL(url); // Cleanup
                },
                undefined,
                (error) => {
                    statusMsg.textContent = "Error parsing file.";
                    console.error(error);
                }
            );
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
