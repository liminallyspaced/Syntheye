<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Controller - Idle & Walk</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); color: white; padding: 20px; border-radius: 8px;
            pointer-events: none; transition: opacity 0.5s;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 20px;
            color: #333; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 4px;
        }
    </style>
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Loading Models...</div>
    <div id="instructions">
        <b>WASD / Arrow Keys</b> to Move<br>
        Character idles when stopped.
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration ---
        const WALKING_SPEED = 5;
        const ROTATION_SPEED = 10;
        const FADE_DURATION = 0.2; // Seconds to crossfade between idle and walk

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0a0a0);
        scene.fog = new THREE.Fog(0xa0a0a0, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(3, 10, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Ground ---
        const groundMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshPhongMaterial({ color: 0x999999, depthWrite: false })
        );
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        // --- Grid ---
        const grid = new THREE.GridHelper(100, 40, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- Character Variables ---
        let model, mixer;
        let actions = {};
        let activeAction, previousAction;
        let isMoving = false;
        
        // Input state
        const keys = { w: false, a: false, s: false, d: false };

        // --- Load Models ---
        const loader = new GLTFLoader();
        
        Promise.all([
            // 1. Load the IDLE model (This acts as our base character mesh + idle anim)
            loader.loadAsync('./idle.glb').catch(err => { console.error('Error loading idle.glb:', err); return null; }),
            
            // 2. Load the WALK model (We only want the animation from this one)
            loader.loadAsync('./walk.glb').catch(err => { console.error('Error loading walk.glb:', err); return null; })
        ]).then(([idleGltf, walkGltf]) => {
            
            if (!idleGltf) {
                document.getElementById('loading').innerText = "Error: idle.glb not found.";
                return;
            }

            // Setup the main model (using the idle GLB as the base)
            model = idleGltf.scene;
            model.traverse(object => {
                if (object.isMesh) object.castShadow = true;
            });
            scene.add(model);

            // Create Animation Mixer
            mixer = new THREE.AnimationMixer(model);

            // 1. Process Idle Animation
            if (idleGltf.animations.length > 0) {
                const idleClip = idleGltf.animations[0];
                actions['Idle'] = mixer.clipAction(idleClip);
                actions['Idle'].play(); // Start playing idle immediately
                activeAction = actions['Idle'];
            } else {
                console.warn("No animations found in idle.glb");
            }

            // 2. Process Walk Animation (Retargeting)
            // We take the animation clip from the 'walk' file and apply it to the 'idle' model's mixer
            if (walkGltf && walkGltf.animations.length > 0) {
                const walkClip = walkGltf.animations[0];
                actions['Walk'] = mixer.clipAction(walkClip);
            } else {
                console.warn("No animations found in walk.glb or file missing");
            }

            document.getElementById('loading').style.opacity = 0;
            animate();

        }).catch(error => {
            console.error(error);
            document.getElementById('loading').innerText = "Error loading models.";
        });

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.minDistance = 2;
        controls.maxDistance = 10;
        controls.target.set(0, 1, 0);
        controls.update();

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (keys[k] !== undefined) keys[k] = true;
            if (k === 'arrowup') keys.w = true;
            if (k === 'arrowdown') keys.s = true;
            if (k === 'arrowleft') keys.a = true;
            if (k === 'arrowright') keys.d = true;
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (keys[k] !== undefined) keys[k] = false;
            if (k === 'arrowup') keys.w = false;
            if (k === 'arrowdown') keys.s = false;
            if (k === 'arrowleft') keys.a = false;
            if (k === 'arrowright') keys.d = false;
        });

        // --- Animation Management ---
        function switchAction(name) {
            const newAction = actions[name];
            if (!newAction || activeAction === newAction) return;

            previousAction = activeAction;
            activeAction = newAction;

            previousAction.fadeOut(FADE_DURATION);
            activeAction.reset().fadeIn(FADE_DURATION).play();
        }

        // --- Game Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();

            if (model && mixer) {
                // Movement Logic
                let moveX = 0;
                let moveZ = 0;

                // Check inputs relative to camera direction would be better, 
                // but for simplicity, we do world-space WASD
                if (keys.w) moveZ = -1;
                if (keys.s) moveZ = 1;
                if (keys.a) moveX = -1;
                if (keys.d) moveX = 1;

                // Update State
                if (moveX !== 0 || moveZ !== 0) {
                    // Normalize vector
                    const len = Math.sqrt(moveX**2 + moveZ**2);
                    moveX /= len;
                    moveZ /= len;

                    // Move Model
                    model.position.x += moveX * WALKING_SPEED * dt;
                    model.position.z += moveZ * WALKING_SPEED * dt;

                    // Rotate Model to face direction
                    const targetRotation = Math.atan2(moveX, moveZ);
                    
                    // Smooth rotation
                    let rotDiff = targetRotation - model.rotation.y;
                    // Normalize angle to -PI to PI
                    while (rotDiff > Math.PI) rotDiff -= Math.PI * 2;
                    while (rotDiff < -Math.PI) rotDiff += Math.PI * 2;
                    
                    model.rotation.y += rotDiff * ROTATION_SPEED * dt;

                    if (!isMoving) {
                        isMoving = true;
                        switchAction('Walk');
                    }
                } else {
                    if (isMoving) {
                        isMoving = false;
                        switchAction('Idle');
                    }
                }

                // Update Camera Target to follow player
                controls.target.copy(model.position).y += 1;
                
                // Update Mixer
                mixer.update(dt);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
