<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTHEYE // Nicholas M. Siegel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Core Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script> 
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-bg: #050505;
            --color-ui-bg: #1a1a1d;
            --color-text: #c0c0c0;
            --color-accent: #8a0000;
            --color-highlight: #ff3333;
        }
        body { background-color: var(--color-bg); color: var(--color-text); overflow: hidden; font-family: 'Inter', sans-serif; user-select: none; }
        
        .crt-effect::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
        }
        
        .retro-text { font-family: 'Press Start 2P', monospace; text-shadow: 2px 2px 0px rgba(0,0,0,0.8); }
        
        .menu-btn { font-family: 'Press Start 2P', monospace; transition: all 0.1s; cursor: pointer; border-left: 4px solid transparent; padding-left: 10px; }
        .menu-btn:hover, .menu-btn.selected { color: var(--color-highlight); border-left: 4px solid var(--color-accent); text-shadow: 0 0 5px var(--color-accent); }

        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 50; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .screen.active { display: flex; }

        .popup-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px; background: var(--color-ui-bg); border: 2px solid var(--color-accent); box-shadow: 0 0 20px rgba(0,0,0,0.9); padding: 20px; z-index: 30; display: none; }
        
        #inspection-canvas-container { width: 100%; height: 400px; background: #000; border: 1px solid #333; margin-bottom: 10px; }
    </style>
</head>
<body class="crt-effect">

    <audio id="bgm-menu" loop><source src="assets/audio/menu_theme.mp3" type="audio/mp3"></audio>
    <audio id="bgm-game" loop><source src="assets/audio/game_theme.mp3" type="audio/mp3"></audio>

    <div id="video-sequence" class="video-overlay">
        <div id="video-placeholder" class="text-center">
            <h1 class="text-4xl text-red-600 retro-text mb-4">SYNTHEYE</h1>
            <p class="text-gray-500 animate-pulse">[ VIDEO SEQUENCE PLAYING... ]</p>
            <p class="text-xs text-gray-700 mt-4">Click anywhere to skip</p>
        </div>
        <video id="main-video" class="hidden" muted playsinline></video>
    </div>

    <div id="screen-press-start" class="screen justify-center items-center bg-black">
        <button id="btn-press-start" class="text-3xl text-red-600 retro-text animate-pulse hover:text-white">PRESS START</button>
    </div>

    <div id="screen-main-menu" class="screen justify-center items-center bg-black/90">
        <div class="w-full max-w-lg p-8 border-l-4 border-red-800 bg-gray-900/50">
            <h1 class="text-5xl text-red-600 retro-text mb-2">SYNTHEYE</h1>
            <h2 class="text-xl text-gray-500 mb-8 retro-text tracking-widest">NICHOLAS M. SIEGEL</h2>
            <nav class="flex flex-col gap-4 text-xl">
                <div class="menu-btn selected" data-action="start">START 3D EXPERIENCE</div>
                <div class="menu-btn" data-action="archive">2D PORTFOLIO ARCHIVE</div>
                <div class="menu-btn" data-action="about">ABOUT THE ARCHITECT</div>
                <div class="menu-btn" data-action="options">CONFIGURATION</div>
            </nav>
        </div>
    </div>

    <div id="screen-overworld" class="screen">
        <div id="game-canvas-container" class="absolute inset-0 z-0"></div>
        <div class="absolute inset-0 z-10 pointer-events-none p-6 flex flex-col justify-between">
            <div class="flex justify-between items-start">
                <div class="bg-black/50 p-2 border border-gray-700">
                    <p class="text-xs text-red-500 retro-text">LOCATION:</p>
                    <p id="ui-room-name" class="text-lg text-white retro-text">MAIN HALL</p>
                </div>
                <div class="pointer-events-auto">
                    <button onclick="window.App.showMenu()" class="bg-gray-800 text-white px-3 py-1 border border-gray-600 hover:bg-red-900 text-xs retro-text">MENU [ESC]</button>
                </div>
            </div>
            <div id="interaction-prompt" class="self-center hidden bg-red-900/80 text-white px-6 py-2 border-2 border-red-500 retro-text text-sm animate-pulse">[E] INTERACT</div>
        </div>
        <div id="loading-indicator" class="hidden absolute inset-0 bg-black z-50 flex items-center justify-center">
            <p class="retro-text text-red-600">LOADING AREA...</p>
        </div>
    </div>

    <div id="popup-text" class="popup-container">
        <h2 id="popup-text-title" class="text-2xl text-red-500 retro-text mb-4">TITLE</h2>
        <p id="popup-text-content" class="text-gray-300 leading-relaxed mb-6 whitespace-pre-wrap">Content...</p>
        <button onclick="window.App.closePopup()" class="bg-red-900 text-white px-4 py-2 retro-text text-sm hover:bg-red-700">[CLOSE]</button>
    </div>

    <div id="popup-inspect" class="popup-container">
        <h2 id="popup-inspect-title" class="text-2xl text-red-500 retro-text mb-2">OBJECT</h2>
        <div id="inspection-canvas-container"></div>
        <p id="popup-inspect-desc" class="text-gray-400 text-sm mb-4">Description...</p>
        <button onclick="window.App.closePopup()" class="bg-red-900 text-white px-4 py-2 retro-text text-sm hover:bg-red-700">[CLOSE]</button>
    </div>

    <div id="screen-generic" class="screen justify-center items-center bg-black/95 z-40">
        <div class="max-w-2xl w-full p-8 border border-red-900 bg-gray-900">
            <h2 id="generic-title" class="text-3xl text-red-600 retro-text mb-6">TITLE</h2>
            <div id="generic-content" class="text-gray-300 mb-8 space-y-4">Content</div>
            <button onclick="window.App.setScreen('screen-main-menu')" class="bg-gray-700 text-white px-4 py-2 retro-text hover:bg-gray-600">[BACK]</button>
        </div>
    </div>

    <script type="module" src="App.js"></script>
</body>
</html>
